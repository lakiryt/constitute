<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>新日本国憲法案ロゴ</title>

  <defs>
    <!-- 穴をあけるためのマスク -->
    <mask id="holes">
      <!-- 基本的に穴はあけない -->
      <rect x="0" y="0" width="128" height="128" fill="white"/>
      <!-- 穴をあけるのは以下３か所 -->      
      <rect               x="27" y="56" width="14" height="16" fill="black"/>
      <rect rx="3" ry="3" x="57" y="56" width="14" height="16" fill="black"/>
      <rect rx="5" ry="5" x="87" y="56" width="14" height="16" fill="black"/>
    </mask>
    <radialGradient id="gradient" gradientUnits="userSpaceOnUse" cx="94" cy="64" r="60" fx="80" fy="20">
      <stop offset="0%" stop-color="#a6a5c4" />
      <stop offset="100%" stop-color="#203744" />
    </radialGradient>
   </defs>

  <!-- 本体 -->
  <rect x="8" y="38" width="112" height="52" fill="url(#gradient)" mask="url(#holes)"/>

</svg>
